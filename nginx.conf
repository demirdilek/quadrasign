events {}

http {
    # Hide Nginx version number for security
    server_tokens off;

    # 1. HTTP to HTTPS Redirect
    server {
        listen 80;
        server_name _; # Catch-all for any hostname

        # Note: If running locally on mapped ports (8080/8443), this redirect 
        # will try to send you to port 443 on your host. This block shines in production 
        # where ports 80 and 443 are directly exposed.
        return 301 https://$host$request_uri;
    }

    # 2. Secure HTTPS Server
    server {
        listen 443 ssl;
        server_name _;

        # TLS certificate paths mounted into the container
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        # Hardened TLS protocols
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /dashboard/ {
            proxy_pass http://grafana:3000;
            
            # Use $http_host instead of $host:80 to preserve the actual port requested
            proxy_set_header Host $http_host; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Crucial: Tell Grafana the original request was secure
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /metrics {
            proxy_pass http://api-prober:8080/metrics;
            proxy_set_header Host $http_host;
        }
    }
}