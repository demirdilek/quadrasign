apiVersion: 1

providers:
  - name: 'quadrasign-dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      # Grafana scans this container directory for JSON dashboard files
      path: /var/lib/grafana/dashboards
    # Forces this provider's first dashboard to be the global home dashboard
    isDefault: true