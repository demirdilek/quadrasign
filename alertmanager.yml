global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'target']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'pushover-alerts'

receivers:
  - name: 'pushover-alerts'
    pushover_configs:
      - user_key: 'PUSHOVER_USER_KEY_PLACEHOLDER'
        token: 'PUSHOVER_API_TOKEN_PLACEHOLDER'
        # Escalated to Emergency priority to bypass silent mode
        priority: '2'
        # Repeats the alert sound every 30 seconds until acknowledged
        retry: '30s'
        # Stops repeating the sound after 15 minutes if unacknowledged
        expire: '15m'
        title: 'SRE Alert: {{ .CommonLabels.alertname }}'
        message: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'