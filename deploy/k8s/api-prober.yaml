apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# Define the target list as a ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-prober-targets
  namespace: monitoring
data:
  targets.csv: |
    http://httpbin.org/status/200
    http://httpbin.org/delay/1
---
# Deploy the worker pool application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-prober
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-prober
  template:
    metadata:
      labels:
        app: api-prober
    spec:
      containers:
      - name: api-prober
        # Replace with your local registry or image name
        image: api-prober:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: metrics
        env:
        - name: WORKERS
          value: "50"
        - name: QUEUE_SIZE
          value: "10000"
        - name: MAX_IDLE_CONNS
          value: "1000"
        - name: MAX_IDLE_CONNS_PER_HOST
          value: "100"
        - name: PROBE_INTERVAL_SECONDS
          value: "2"
        volumeMounts:
        - name: targets-volume
          mountPath: /app/targets.csv
          subPath: targets.csv
          readOnly: true
      volumes:
      - name: targets-volume
        configMap:
          name: api-prober-targets
---
# Expose the application internally
apiVersion: v1
kind: Service
metadata:
  name: api-prober
  namespace: monitoring
  labels:
    app: api-prober
spec:
  ports:
  - port: 8080
    targetPort: metrics
    name: metrics
  selector:
    app: api-prober
---
# Tell Prometheus Operator to scrape the 4 Golden Signals metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-prober
  namespace: monitoring
  labels:                  # <-- ADD THIS
    release: prom-stack    # <-- ADD THIS
spec:
  selector:
    matchLabels:
      app: api-prober
  endpoints:
  - port: metrics
    interval: 5s